name: Build and Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
          xcodebuild -version

      - name: Set build number
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} + 0 ))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APP_VERSION=1.1" >> $GITHUB_ENV

      - name: Import Distribution Certificate
        env:
          CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERT_BASE64" | base64 -D > cert.p12
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Set up ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8

      - name: Install xcodeproj gem and create project
        run: |
          gem install xcodeproj
          ruby create_project.rb

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project LoveSignal.xcodeproj \
            -scheme LoveSignal \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/LoveSignal.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            MARKETING_VERSION=$APP_VERSION \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
            -authenticationKeyID WDXGY9WX55 \
            -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/LoveSignal.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
            -authenticationKeyID WDXGY9WX55 \
            -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

      - name: Upload IPA
        run: |
          IPA_FILE=$(find build/export -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            -t ios \
            --apiKey WDXGY9WX55 \
            --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec

      - name: Install ASC API tools
        run: pip3 install --break-system-packages PyJWT requests

      - name: Upload Screenshots
        continue-on-error: true
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
          APP_VERSION: "1.1"
          SCREENSHOT_DIR: AppStoreScreenshots
        run: python3 scripts/upload_screenshots.py

      - name: Submit for Review
        continue-on-error: true
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
          APP_VERSION: "1.1"
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: python3 scripts/submit.py
